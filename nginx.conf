# nginx.conf
# Host side config file bind mounted to nginx imagine inside reverse proxy container

server {
    listen 80;
    location /mcp {
        proxy_pass http://mcp-server-remote:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
